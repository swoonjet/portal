<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vent Confetti - Motion Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; max-width: 100vw; max-height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const img = new Image();
img.onload = () => {
  const scale = Math.min(window.innerWidth / img.width, window.innerHeight / img.height, 1);
  canvas.width = img.width * scale;
  canvas.height = img.height * scale;
  const cw = canvas.width;
  const ch = canvas.height;

  const TL = { x: cw * 0.098, y: ch * 0.409 };
  const TR = { x: cw * 0.175, y: ch * 0.409 };
  const BL = { x: cw * 0.213, y: ch * 0.466 };
  const edgeTop = { x: TR.x - TL.x, y: TR.y - TL.y };
  const edgeSide = { x: BL.x - TL.x, y: BL.y - TL.y };

  function randomInPoly() {
    const u = Math.random();
    const v = Math.random();
    return {
      x: TL.x + u * edgeTop.x + v * edgeSide.x,
      y: TL.y + u * edgeTop.y + v * edgeSide.y
    };
  }

  const wallColors = [
    "#9B5B8A", "#C46B8A", "#D4708A", "#B0609A",
    "#6EC5B8", "#5BBFAA", "#7DD4C0", "#4DB89E",
    "#D4A030", "#C89828", "#DEAD42", "#BF9020",
    "#E07888", "#D86878", "#CC5A6A", "#E88898",
    "#A868A0", "#8B4888", "#7A3878", "#B878B0",
    "#78D0A8", "#58C898", "#88D8B8", "#48B888",
  ];

  class Particle {
    constructor() {
      this.reset();
      this.age = Math.random() * this.maxAge * 0.5;
    }

    reset() {
      const spawn = randomInPoly();
      this.x = spawn.x;
      this.y = spawn.y;

      this.vx = (Math.random() - 0.5) * 0.8;
      this.vy = 2.0 + Math.random() * 3.0;

      this.fallDuration = 40 + Math.random() * 35;
      this.stallDuration = 50 + Math.random() * 70;
      this.floatGravity = -0.010 - Math.random() * 0.016;

      // Gentle drift direction — subtle, not a scatter cannon
      this.driftVx = (Math.random() - 0.5) * 0.03;

      this.drag = 0.997 + Math.random() * 0.002;

      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.2;
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSpeed = 0.015 + Math.random() * 0.04;
      this.wobbleAmp = 0.2 + Math.random() * 0.5;

      this.w = 3 + Math.random() * 4;
      this.h = 3 + Math.random() * 4;

      this.color = wallColors[Math.floor(Math.random() * wallColors.length)];
      this.opacity = 0.8 + Math.random() * 0.2;
      this.maxAge = 420 + Math.random() * 350;
      this.age = 0;
    }

    update() {
      this.age++;

      const stallStart = this.fallDuration;
      const stallEnd = this.fallDuration + this.stallDuration;

      if (this.age < stallStart) {
        this.vy += 0.025;
      } else if (this.age < stallEnd) {
        let t = (this.age - stallStart) / this.stallDuration;
        t = 1 - Math.pow(1 - t, 3);
        this.vy *= (1 - t * 0.07);
        this.vx *= (1 - t * 0.03);
      } else {
        // Float up with gentle drift
        const floatAge = this.age - stallEnd;
        const ramp = Math.min(1, floatAge / 70);
        const eased = ramp * ramp;
        this.vy += this.floatGravity * eased;

        // Gentle consistent drift — just a nudge each frame
        this.vx += this.driftVx;
      }

      this.wobble += this.wobbleSpeed;
      this.vx += Math.sin(this.wobble) * this.wobbleAmp * 0.008;

      this.vx *= this.drag;
      this.vy *= this.drag;

      this.x += this.vx;
      this.y += this.vy;
      this.rotation += this.rotSpeed;

      if (this.age > this.maxAge * 0.75) {
        const fade = (this.age - this.maxAge * 0.75) / (this.maxAge * 0.25);
        this.opacity = Math.max(0, (1 - fade) * 0.9);
      }

      if (this.age >= this.maxAge || this.y < -50 || this.y > ch + 50 || this.x < -100 || this.x > cw + 100) {
        this.reset();
      }
    }

    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = this.color;
      const scaleX = Math.abs(Math.cos(this.wobble)) * 0.5 + 0.5;
      ctx.fillRect(-this.w / 2 * scaleX, -this.h / 2, this.w * scaleX, this.h);
      ctx.restore();
    }
  }

  const PARTICLE_COUNT = 600;
  const particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }

  let gustTimer = 0, gustVx = 0;

  function animate() {
    ctx.globalAlpha = 1;
    ctx.drawImage(img, 0, 0, cw, ch);

    gustTimer++;
    if (gustTimer % 120 === 0) {
      gustVx = (Math.random() - 0.5) * 1.0;
    }
    gustVx *= 0.97;

    for (const p of particles) {
      if (Math.abs(gustVx) > 0.03) {
        p.vx += gustVx * 0.002;
      }
      p.update();
      p.draw(ctx);
    }

    requestAnimationFrame(animate);
  }

  animate();
};
